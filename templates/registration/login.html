{% extends "base.html" %}
{% block title %}Login | Matyz Stock{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
  <form method="post" class="space-y-4 max-w-md">
    {% csrf_token %}

    {% if form.errors %}
      <div class="matyz-surface rounded-sm p-3 text-sm">
        Invalid username or password.
      </div>
    {% endif %}

    <div>
      <label class="block text-xs matyz-muted mb-1">Username</label>
      <input type="text" name="username" class="w-full px-3 py-2 rounded-sm matyz-surface outline-none" />
    </div>

    <div>
      <label class="block text-xs matyz-muted mb-1">Password</label>
      <input type="password" name="password" class="w-full px-3 py-2 rounded-sm matyz-surface outline-none" />
    </div>

    <button type="submit" class="px-4 py-2 rounded-sm matyz-btn text-sm">Sign in</button>
  </form>
{% endblock %}
